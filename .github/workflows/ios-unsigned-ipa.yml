name: iOS Unsigned Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    # macos-latest is now arm64 (Apple Silicon)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        # Using @v2 is fine, but pinning a specific version 
        # avoids the "Unable to determine version" error.
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0' # Pinned to a known stable version
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter iOS (no-codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          # Search for the .app bundle in the build output
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: .app not found"
            exit 1
          fi
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../KINETIC-unsigned.ipa Payload/
          echo "✅ IPA created: build/KINETIC-unsigned.ipa"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KINETIC-unsigned-ipa
          path: build/KINETIC-unsigned.ipa
          retention-days: 7