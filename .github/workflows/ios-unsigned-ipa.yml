name: iOS Unsigned Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter iOS (Prepare)
        run: |
          # This command may fail due to no codesigning team, but it prepares the environment.
          flutter build ios --release --no-codesign || true

      - name: Xcodebuild Archive (Unsigned)
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            -archivePath ../build/ios/Runner.xcarchive

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          APP_PATH=$(find build/ios/Runner.xcarchive/Products -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: .app not found in archive"
            exit 1
          fi
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../KINETIC-unsigned.ipa Payload/
          echo "✅ IPA created: build/KINETIC-unsigned.ipa"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KINETIC-unsigned-ipa
          path: build/KINETIC-unsigned.ipa
          retention-days: 7