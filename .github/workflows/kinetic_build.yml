name: KINETIC Cross-Platform Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build Unsigned IPA (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock', 'ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter iOS (Prepare)
        run: |
          cd ios && pod install && cd ..
          flutter build ios --release --no-codesign || true

      - name: Xcodebuild Archive (Unsigned)
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            -archivePath ../build/ios/Runner.xcarchive

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          APP_PATH=$(find build/ios/Runner.xcarchive/Products -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: .app not found in archive"
            exit 1
          fi
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../KINETIC-unsigned.ipa Payload/
          echo "✅ IPA created: build/KINETIC-unsigned.ipa"
          
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KINETIC-unsigned-ipa
          path: build/KINETIC-unsigned.ipa
          retention-days: 7

  build_android:
    name: Build APK (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KINETIC-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
