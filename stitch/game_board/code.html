<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KINETIC - Kinetic Precision Tic Tac Toe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-dim": "#24f07e",
              "on-tertiary": "#006731",
              "inverse-primary": "#006976",
              "surface-container": "#171a1c",
              "on-secondary-fixed-variant": "#7a4300",
              "surface-dim": "#0c0e10",
              "on-error": "#490006",
              "on-tertiary-fixed": "#004820",
              "primary-fixed-dim": "#00d4ec",
              "surface-container-highest": "#232629",
              "on-tertiary-fixed-variant": "#006832",
              "on-primary": "#005762",
              "on-surface": "#eeeef0",
              "on-primary-fixed": "#003840",
              "surface": "#0c0e10",
              "error": "#ff716c",
              "error-container": "#9f0519",
              "surface-container-lowest": "#000000",
              "on-secondary": "#462400",
              "on-secondary-container": "#fff6f1",
              "on-secondary-fixed": "#512a00",
              "secondary-dim": "#ea8400",
              "on-surface-variant": "#aaabad",
              "background": "#0c0e10",
              "on-primary-fixed-variant": "#005762",
              "on-error-container": "#ffa8a3",
              "primary": "#81ecff",
              "on-primary-container": "#004d57",
              "outline-variant": "#46484a",
              "inverse-on-surface": "#535557",
              "secondary": "#fd9000",
              "surface-bright": "#292c2f",
              "inverse-surface": "#f9f9fc",
              "primary-dim": "#00d4ec",
              "surface-container-high": "#1d2022",
              "on-background": "#eeeef0",
              "primary-container": "#00e3fd",
              "on-tertiary-container": "#005d2c",
              "tertiary-container": "#3fff8b",
              "tertiary-fixed": "#3fff8b",
              "tertiary": "#b5ffc2",
              "error-dim": "#d7383b",
              "surface-container-low": "#111416",
              "secondary-container": "#8e4e00",
              "secondary-fixed": "#ffc697",
              "surface-variant": "#232629",
              "surface-tint": "#81ecff",
              "secondary-fixed-dim": "#ffb470",
              "tertiary-fixed-dim": "#24f07e",
              "primary-fixed": "#00e3fd",
              "outline": "#747578"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .marker-x {
            background: linear-gradient(45deg, #81ecff 0%, #00e3fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .marker-o {
            background: linear-gradient(45deg, #fd9000 0%, #ea8400 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(35, 38, 41, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar Shell -->
<header class="bg-[#0c0e10] dark:bg-[#0c0e10] flex justify-between items-center px-6 py-4 w-full fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high border border-outline-variant/10 flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="User profile avatar icon placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMLaPyWNbJAqtS4D7XsMy76OpLypvD8xjv-wTNlfL_-8WTS-lpuyKUxKdllxeWWBIAWWzn36eTXCx_qRgSc8uxZuGg6OLEHtJQdNUI0FSZGoJp06zjsyDj0klsICvwi6bi5247fDPWCNh3Uxx2K7JZ9mnd8n8VtBJBhT9tO8v6ZPYuLrqNcOCp2qtgLHUzjBdRzUytksM17xBS5v4pTpdQwZqwdPohuDL95QNqlDzSbOZ0xPs_5DETAQdxeE0VthcASDItG8Iwf-gA"/>
</div>
<span class="font-['Plus_Jakarta_Sans'] font-black italic text-[#00E5FF] text-2xl tracking-tighter">KINETIC</span>
</div>
<button class="text-[#00E5FF] hover:opacity-80 transition-opacity active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
</button>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 max-w-2xl mx-auto flex flex-col gap-10">
<!-- Scoreboard & Player Info -->
<section class="relative grid grid-cols-2 gap-4">
<!-- Player 1 (X) -->
<div class="bg-surface-container-low p-6 rounded-lg relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-primary/40"></div>
<div class="flex flex-col gap-1">
<span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Player 1</span>
<div class="flex items-center justify-between">
<span class="text-primary text-4xl font-headline font-extrabold tracking-tighter">X</span>
<span class="text-on-surface text-5xl font-headline font-bold leading-none">12</span>
</div>
</div>
<!-- Online Status Indicator -->
<div class="absolute top-4 right-4 w-2 h-2 rounded-full bg-tertiary-fixed shadow-[0_0_10px_rgba(63,255,139,0.5)]"></div>
</div>
<!-- Player 2 (O) - Active State Example -->
<div class="bg-surface-container-high p-6 rounded-lg relative overflow-hidden ring-2 ring-secondary/20 shadow-xl">
<div class="absolute top-0 right-0 w-1 h-full bg-secondary"></div>
<div class="flex flex-col gap-1">
<span class="text-secondary text-xs font-bold tracking-widest uppercase">Your Turn</span>
<div class="flex items-center justify-between">
<span class="text-secondary text-4xl font-headline font-extrabold tracking-tighter">O</span>
<span class="text-on-surface text-5xl font-headline font-bold leading-none">08</span>
</div>
</div>
<div class="mt-4 h-1 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-secondary w-2/3"></div>
</div>
</div>
</section>
<!-- Dynamic Game Controls (Undo/Timer) -->
<div class="flex justify-between items-center px-2">
<div class="flex items-center gap-4">
<button class="bg-surface-bright/50 p-3 rounded-full hover:bg-surface-bright transition-all active:scale-90 flex items-center justify-center border border-outline-variant/10">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="undo">undo</span>
</button>
<div class="flex flex-col">
<span class="text-on-surface-variant text-[10px] font-bold uppercase tracking-widest">Remaining</span>
<span class="text-on-surface font-headline font-bold text-lg tabular-nums">00:14</span>
</div>
</div>
<div class="bg-secondary/10 px-4 py-2 rounded-full flex items-center gap-2">
<span class="text-secondary font-bold text-sm">Waiting for O...</span>
</div>
</div>
<!-- Tic Tac Toe Grid -->
<div class="aspect-square w-full grid grid-cols-3 gap-4 bg-surface-container-low p-4 rounded-xl shadow-2xl relative">
<!-- Grid Tiles -->
<!-- Row 1 -->
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer group">
<span class="text-6xl font-headline font-black marker-x opacity-100 transition-all scale-100">X</span>
</div>
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer"></div>
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer group">
<span class="text-6xl font-headline font-black marker-o opacity-100 transition-all scale-100">O</span>
</div>
<!-- Row 2 -->
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer"></div>
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer group">
<span class="text-6xl font-headline font-black marker-o opacity-100 transition-all scale-100">O</span>
</div>
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer group">
<span class="text-6xl font-headline font-black marker-x opacity-100 transition-all scale-100">X</span>
</div>
<!-- Row 3 -->
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer"></div>
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer"></div>
<div class="bg-surface-container-high rounded-md flex items-center justify-center hover:bg-surface-bright transition-colors cursor-pointer"></div>
<!-- Win Line Indicator (Example Overlay) -->
<div class="hidden absolute top-[50%] left-4 right-4 h-2 bg-primary rounded-full blur-[2px] shadow-[0_0_20px_#81ecff]"></div>
</div>
<!-- Primary Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-tertiary text-on-tertiary font-headline font-bold py-5 rounded-md flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-tertiary/10">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                RESTART GAME
            </button>
<button class="bg-surface-bright text-on-surface font-headline font-bold py-5 rounded-md flex items-center justify-center gap-2 hover:bg-surface-variant active:scale-[0.98] transition-all border border-outline-variant/20">
<span class="material-symbols-outlined text-error" data-icon="logout">logout</span>
                QUIT MATCH
            </button>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#111416]/90 backdrop-blur-xl shadow-[0_-10px_40px_rgba(0,0,0,0.4)] rounded-t-[2rem]">
<button class="flex flex-col items-center justify-center bg-[#00E5FF]/10 text-[#00E5FF] rounded-full px-6 py-2 scale-110 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[12px]">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 hover:bg-white/5 transition-all">
<span class="material-symbols-outlined" data-icon="sports_esports">sports_esports</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[12px]">Play</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-slate-300 hover:bg-white/5 transition-all">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[12px]">Settings</span>
</button>
</nav>
</body></html>
