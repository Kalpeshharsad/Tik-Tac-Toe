<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#00e3fd",
              "on-primary-fixed": "#003840",
              "on-background": "#eeeef0",
              "surface-container-low": "#111416",
              "on-tertiary-fixed": "#004820",
              "on-tertiary": "#006731",
              "on-secondary": "#462400",
              "tertiary-container": "#3fff8b",
              "secondary-fixed-dim": "#ffb470",
              "surface-bright": "#292c2f",
              "primary-dim": "#00d4ec",
              "on-error": "#490006",
              "on-secondary-container": "#fff6f1",
              "surface-dim": "#0c0e10",
              "secondary": "#fd9000",
              "secondary-container": "#8e4e00",
              "on-tertiary-fixed-variant": "#006832",
              "on-tertiary-container": "#005d2c",
              "secondary-dim": "#ea8400",
              "inverse-on-surface": "#535557",
              "surface-container-lowest": "#000000",
              "on-primary-fixed-variant": "#005762",
              "inverse-primary": "#006976",
              "tertiary-fixed": "#3fff8b",
              "surface-container": "#171a1c",
              "primary-fixed-dim": "#00d4ec",
              "secondary-fixed": "#ffc697",
              "surface": "#0c0e10",
              "on-secondary-fixed": "#512a00",
              "error-container": "#9f0519",
              "error": "#ff716c",
              "surface-container-high": "#1d2022",
              "primary-fixed": "#00e3fd",
              "outline-variant": "#46484a",
              "on-error-container": "#ffa8a3",
              "tertiary": "#b5ffc2",
              "on-primary-container": "#004d57",
              "surface-variant": "#232629",
              "background": "#0c0e10",
              "tertiary-fixed-dim": "#24f07e",
              "outline": "#747578",
              "surface-container-highest": "#232629",
              "on-surface-variant": "#aaabad",
              "tertiary-dim": "#24f07e",
              "inverse-surface": "#f9f9fc",
              "on-surface": "#eeeef0",
              "on-primary": "#005762",
              "primary": "#81ecff",
              "on-secondary-fixed-variant": "#7a4300",
              "error-dim": "#d7383b",
              "surface-tint": "#81ecff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 227, 253, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 227, 253, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: linear-gradient(135deg, rgba(29, 32, 34, 0.8) 0%, rgba(17, 20, 22, 0.9) 100%);
        }
        .glow-primary {
            box-shadow: 0 0 20px rgba(0, 227, 253, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#111416]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-4">
<button class="text-cyan-400 active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tighter text-cyan-400">KINETIC</h1>
</div>
<div class="text-2xl font-black italic text-cyan-400 tracking-widest">
                K
            </div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center relative px-6 py-12 kinetic-grid">
<!-- Background Accents -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-secondary/10 rounded-full blur-[120px]"></div>
<div class="w-full max-w-md z-10">
<!-- Editorial Heading -->
<div class="mb-12 flex flex-col items-start">
<span class="text-primary font-bold tracking-[0.3em] text-xs mb-2 block">AUTHENTICATION</span>
<h2 class="text-on-surface font-headline font-extrabold text-5xl leading-tight">Enter the <br/><span class="text-primary italic">Arena</span></h2>
</div>
<!-- Login Form -->
<div class="glass-panel p-8 rounded-lg border border-white/5 shadow-2xl space-y-8">
<div class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-on-surface-variant text-xs font-bold tracking-wider ml-1">EMAIL OR USER ID</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-md px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="name@kinetic.play" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="alternate_email">alternate_email</span>
</div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-on-surface-variant text-xs font-bold tracking-wider">PASSWORD</label>
<button class="text-primary text-xs font-bold hover:underline">Forgot Password?</button>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-md px-5 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-fixed text-on-primary-fixed font-headline font-black py-5 rounded-md text-lg tracking-widest active:scale-95 duration-200 glow-primary transition-all flex items-center justify-center gap-3">
                    SIGN IN
                    <span class="material-symbols-outlined font-bold" data-icon="bolt">bolt</span>
</button>
<!-- Footer Links -->
<div class="text-center">
<p class="text-on-surface-variant text-sm">
                        Don't have an arena pass? 
                        <button class="text-tertiary font-bold ml-1 hover:underline">Create Account</button>
</p>
</div>
</div>
<!-- Kinetic Detail Elements -->
<div class="mt-12 flex justify-between items-center opacity-30">
<div class="h-[1px] bg-outline-variant flex-grow"></div>
<div class="mx-6 flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
</div>
<div class="h-[1px] bg-outline-variant flex-grow"></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-2 bg-[#0c0e10]/80 backdrop-blur-xl border-t border-white/5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] rounded-t-[2rem]">
<!-- Login Tab (Active) -->
<button class="flex flex-col items-center justify-center bg-cyan-400/10 text-cyan-400 rounded-full p-3 active:scale-90 duration-150 transition-colors">
<span class="material-symbols-outlined" data-icon="login" style="font-variation-settings: 'FILL' 1;">login</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium mt-1">Login</span>
</button>
<!-- Create Account Tab -->
<button class="flex flex-col items-center justify-center text-gray-500 p-3 hover:text-cyan-300 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium mt-1">Join</span>
</button>
<!-- Help Tab -->
<button class="flex flex-col items-center justify-center text-gray-500 p-3 hover:text-cyan-300 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium mt-1">Support</span>
</button>
</nav>
<!-- Decorative Corner Visuals -->
<div class="fixed top-20 right-10 w-32 h-32 opacity-10 pointer-events-none select-none">
<svg class="w-full h-full text-primary fill-none stroke-current stroke-[0.5]" viewbox="0 0 100 100">
<rect height="20" width="20" x="10" y="10"></rect>
<rect height="20" width="20" x="40" y="10"></rect>
<rect height="20" width="20" x="70" y="10"></rect>
<rect height="20" width="20" x="10" y="40"></rect>
<rect height="20" width="20" x="40" y="40"></rect>
<rect height="20" width="20" x="70" y="40"></rect>
<rect height="20" width="20" x="10" y="70"></rect>
<rect height="20" width="20" x="40" y="70"></rect>
<rect height="20" width="20" x="70" y="70"></rect>
</svg>
</div>
</body></html>
